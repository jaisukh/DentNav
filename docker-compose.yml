services:
  postgres:
    image: postgres:16-alpine
    container_name: dentnav-postgres
    environment:
      POSTGRES_DB: dentnav
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dentnav"]
      interval: 5s
      timeout: 3s
      retries: 15

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dentnav-backend
    # Load repo-root `.env` into the container. Do not pass secrets as
    # `KEY: ${KEY:-}` here — an empty host substitution overrides env_file.
    env_file:
      - .env
    environment:
      # Overrides .env (often has localhost:15432 for host Postgres).
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dentnav
      PYTHONPATH: /app
      BACKEND_CORS_ORIGINS: http://localhost:3000
      FRONTEND_BASE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time; runtime env alone does not fix NEXT_PUBLIC_*.
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    container_name: dentnav-frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
