services:
  postgres:
    image: postgres:16-alpine
    container_name: dentnav-postgres
    environment:
      POSTGRES_DB: dentnav
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dentnav"]
      interval: 5s
      timeout: 3s
      retries: 15

  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: dentnav-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dentnav?schema=public
      BACKEND_CORS_ORIGINS: http://localhost:3000
      FRONTEND_BASE_URL: http://localhost:3000
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_QUESTIONNAIRE_KEY: ${AWS_S3_QUESTIONNAIRE_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dentnav-frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
