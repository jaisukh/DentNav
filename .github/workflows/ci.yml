name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check app tests
      - name: Pytest
        run: uv run pytest
